# 🛡️ SentinelClaw v0.0.1: Sentinel Security Appliance
# Focus: Zero-Install Deployment. Bare-Metal Agent Support.


services:
  sentinel-gateway:
    build: .
    container_name: sentinel-gateway
    restart: always
    ports:
      # --- Sentinel Multi-Agent Mesh (8080-8089) ---
      - "8080:8080" # Default Aggregator
      - "8081:8081" # Hermes
      - "8082:8082" # Aider
      - "8083:8083" # AutoGPT
      - "8084:8084" # BabyAGI
      - "8085:8085" # GPThinker
      - "8086:8086" # Meta
      - "8087:8087" # Mistral
      - "8088:8088" # Devin
      - "8089:8089" # Custom / Default
      - "3333:3333" # Sentinel Dashboard
    volumes:
      - ./sentinel.toml:/opt/sentinel-claw/sentinel.toml:ro
      - ./.env:/opt/sentinel-claw/.env
      - ./sentinel.db:/opt/sentinel-claw/sentinel.db # Persistent Encrypted Mesh
      - .env-openclaw:/opt/sentinel-claw/.env-openclaw
      - .env-hermes:/opt/sentinel-claw/.env-hermes
      - .env-aider:/opt/sentinel-claw/.env-aider
      - .env-autogpt:/opt/sentinel-claw/.env-autogpt
      - .env-babyagi:/opt/sentinel-claw/.env-babyagi
      - .env-gpthinker:/opt/sentinel-claw/.env-gpthinker
      - .env-meta:/opt/sentinel-claw/.env-meta
      - .env-mistral:/opt/sentinel-claw/.env-mistral
      - .env-devin:/opt/sentinel-claw/.env-devin
      - .env-default:/opt/sentinel-claw/.env-default
      - /tmp:/tmp # Shell Intercept Socket
    env_file:
      - .env
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# All Agent commands now route through their dedicated Sentinel port.
# Materialization occurs transparently at the final execution hop.
